<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Flashlight</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

input[type=range]{
    width:100%;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

#level{
    height:30px;
    background:#ddd;
    margin-top:10px;
}

#fill{
    height:100%;
    width:0%;
    background:green;
}
</style>
</head>

<body>

<h2>Bass-Taschenlampe</h2>

<button id="startBtn">Start</button>

<p>Beat-Empfindlichkeit</p>
<input id="sensitivity" type="range"
       min="1.1" max="3"
       step="0.05" value="1.5">

<p>
Faktor:
<span id="sensValue">1.5</span>
</p>

<div id="level">
    <div id="fill"></div>
</div>

<div id="status">Bereit</div>

<script>

let audioContext;
let analyser;
let freqData;
let torchTrack;

let avgBass = 0;
let lastBeatTime = 0;

const cooldown = 120;

const sensitivitySlider =
    document.getElementById("sensitivity");

sensitivitySlider.addEventListener("input",()=>{
    document.getElementById("sensValue").innerText =
        sensitivitySlider.value;
});

async function setTorch(state){

    if(!torchTrack) return;

    try{
        await torchTrack.applyConstraints({
            advanced:[{torch:state}]
        });
    }catch(e){
        console.log(e);
    }
}

async function flashTorch(){

    await setTorch(true);

    setTimeout(()=>{
        setTorch(false);
    },50);
}

async function start(){

    const mic =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    const cam =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            }
        });

    torchTrack = cam.getVideoTracks()[0];

    audioContext = new AudioContext();

    const source =
        audioContext.createMediaStreamSource(mic);

    analyser = audioContext.createAnalyser();

    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;

    source.connect(analyser);

    freqData =
        new Uint8Array(analyser.frequencyBinCount);

    detectBass();
}

function detectBass(){

    analyser.getByteFrequencyData(freqData);

    const sampleRate =
        audioContext.sampleRate;

    const fftSize =
        analyser.fftSize;

    const bassStart =
        Math.floor(40 * fftSize / sampleRate);

    const bassEnd =
        Math.floor(180 * fftSize / sampleRate);

    let bassEnergy = 0;
    let count = 0;

    for(let i=bassStart;i<=bassEnd;i++){
        bassEnergy += freqData[i];
        count++;
    }

    bassEnergy /= count;

    avgBass = avgBass * 0.98 +
              bassEnergy * 0.02;

    const factor =
        parseFloat(sensitivitySlider.value);

    const threshold =
        avgBass * factor;

    const now = performance.now();

    if(
        bassEnergy > threshold &&
        now - lastBeatTime > cooldown
    ){

        lastBeatTime = now;

        flashTorch();

        document.getElementById("status")
            .innerText =
            "BEAT erkannt";
    }

    const percent =
        Math.min(
            100,
            bassEnergy / 2
        );

    document.getElementById("fill")
        .style.width =
        percent + "%";

    requestAnimationFrame(detectBass);
}

document.getElementById("startBtn")
    .addEventListener("click", start);

</script>

</body>
</html>
