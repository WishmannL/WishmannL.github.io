<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Flashlight</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

label{
    display:block;
    margin-top:15px;
}

input[type=range]{
    width:100%;
}

.value{
    font-weight:bold;
}

#status{
    margin-top:20px;
    font-size:18px;
}

#meter{
    width:100%;
    height:30px;
    background:#ddd;
    margin-top:15px;
}

#fill{
    width:0%;
    height:100%;
    background:#4caf50;
}

button{
    padding:10px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Bass Flashlight</h2>

<button id="startBtn">Start</button>

<label>
Maximale Bassfrequenz:
<span id="freqValue" class="value">150 Hz</span>
<input id="freqSlider" type="range" min="40" max="500" value="150">
</label>

<label>
Top-Prozent die blinken:
<span id="percentValue" class="value">10 %</span>
<input id="percentSlider" type="range" min="1" max="50" value="10">
</label>

<label>
Blitzdauer:
<span id="flashValue" class="value">80 ms</span>
<input id="flashSlider" type="range" min="10" max="500" value="80">
</label>

<div id="meter">
    <div id="fill"></div>
</div>

<div id="status">
Bereit
</div>

<script>

let audioContext;
let analyser;
let freqData;
let torchTrack;

let history = [];
let torchBusy = false;

const HISTORY_SIZE = 300;

const freqSlider = document.getElementById("freqSlider");
const percentSlider = document.getElementById("percentSlider");
const flashSlider = document.getElementById("flashSlider");

freqSlider.oninput = () =>
    document.getElementById("freqValue").innerText =
    freqSlider.value + " Hz";

percentSlider.oninput = () =>
    document.getElementById("percentValue").innerText =
    percentSlider.value + " %";

flashSlider.oninput = () =>
    document.getElementById("flashValue").innerText =
    flashSlider.value + " ms";

async function setTorch(state){

    if(!torchTrack) return;

    try{
        await torchTrack.applyConstraints({
            advanced:[{
                torch:state
            }]
        });
    }
    catch(e){}
}

async function flashTorch(){

    if(torchBusy) return;

    torchBusy = true;

    const duration =
        Number(flashSlider.value);

    await setTorch(true);

    setTimeout(async ()=>{

        await setTorch(false);

        torchBusy = false;

    }, duration);
}

async function start(){

    document.getElementById("status").innerText =
        "Starte...";

    const micStream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    const camStream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            }
        });

    torchTrack =
        camStream.getVideoTracks()[0];

    audioContext =
        new AudioContext({
            latencyHint:"interactive"
        });

    analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0;

    freqData =
        new Uint8Array(
            analyser.frequencyBinCount
        );

    const source =
        audioContext.createMediaStreamSource(
            micStream
        );

    source.connect(analyser);

    document.getElementById("status").innerText =
        "Läuft";

    analyze();
}

function analyze(){

    analyser.getByteFrequencyData(freqData);

    const sampleRate =
        audioContext.sampleRate;

    const maxFreq =
        Number(freqSlider.value);

    const maxBin =
        Math.max(
            1,
            Math.floor(
                maxFreq *
                analyser.fftSize /
                sampleRate
            )
        );

    let bassEnergy = 0;

    for(let i=0;i<maxBin;i++){
        bassEnergy += freqData[i];
    }

    history.push(bassEnergy);

    if(history.length > HISTORY_SIZE){
        history.shift();
    }

    if(history.length > 50){

        const sorted =
            [...history].sort(
                (a,b)=>a-b
            );

        const topPercent =
            Number(percentSlider.value);

        const percentile =
            1 - topPercent / 100;

        const threshold =
            sorted[
                Math.floor(
                    sorted.length *
                    percentile
                )
            ];

        if(bassEnergy > threshold){
            flashTorch();
        }
    }

    const maxDisplay =
        Math.max(...history,1);

    const percent =
        Math.min(
            100,
            bassEnergy /
            maxDisplay *
            100
        );

    document.getElementById("fill")
        .style.width =
        percent + "%";

    requestAnimationFrame(analyze);
}

document.getElementById("startBtn")
    .addEventListener(
        "click",
        start
    );

</script>

</body>
</html>
